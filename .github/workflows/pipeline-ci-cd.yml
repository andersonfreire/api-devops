name: CI/CD Pipeline - Build & Push

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    # Baixa o código
    - name: Checkout do código
      uses: actions/checkout@v4
    
    # Instala o Java 17
    - name: Configurar JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
        
    # Compila a aplicação e gera o .war
    - name: Build com Maven
      run: mvn -B clean package -DskipTests

    # Prepara o motor do Docker
    - name: Configurar Docker Buildx
      uses: docker/setup-buildx-action@v3

    # Faz login no Docker Hub com as credenciais que defini
    - name: Login no Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    # Constrói a imagem a partir do Dockerfile e envia para a nuvem
    - name: Build e Push da Imagem Docker
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/api-devops:latest