name: CI/CD Pipeline - Build, Push & AI Review

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # ==========================================
  # JOB 1: AGENTE DE IA (BÔNUS)
  # ==========================================
  ai-code-review:
    name: Code Review com Gemini
    runs-on: ubuntu-latest
    # A IA só trabalha se for um Pull Request
    if: github.event_name == 'pull_request'
    
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4
        
      - name: Agente Revisor Gemini
        uses: rouxk/gemini-pr-review@v1.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          gemini_api_key: ${{ secrets.GEMINI_API_KEY }}

  # ==========================================
  # JOB 2: SUA ESTEIRA ORIGINAL INTACTA
  # ==========================================
  build-and-deploy:
    name: Build Java & Push Docker Hub
    runs-on: ubuntu-latest

    steps:
    # Baixa o código
    - name: Checkout do código
      uses: actions/checkout@v4
      
    # Instala o Java 17
    - name: Configurar JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
        
    # Compila a aplicação e gera o .war
    - name: Build com Maven
      run: mvn -B clean package -DskipTests

    # Prepara o motor do Docker
    - name: Configurar Docker Buildx
      uses: docker/setup-buildx-action@v3

    # Faz login no Docker Hub com as credenciais que defini
    - name: Login no Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    # Constrói a imagem a partir do Dockerfile e envia para a nuvem
    - name: Build e Push da Imagem Docker
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/api-devops:latest