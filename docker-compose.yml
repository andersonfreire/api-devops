services:
    postgres.producao:
      # Usa o Postgres oficial da nuvem
      image: postgres:15   
      container_name: postgres.producao
      ports:
      - "6543:5432"
      environment:
        - POSTGRES_USER=postgres
        - POSTGRES_PASSWORD=postgres
        - POSTGRES_DB=devops_db
    volumes:
        # Cria um diretório chamado 'dados_postgres' para persistência dos dados
        - ./dados_postgres:/var/lib/postgresql/data

    api.producao:
      # Usa a API que o GitHub Actions enviou para o Docker Hub
      image: andersonfreire1984/api-devops:latest  
      container_name: api.producao
      ports:
      - "8080:8080"
      environment:
        - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres.producao:5432/devops_db
        - SPRING_DATASOURCE_USERNAME=postgres
        - SPRING_DATASOURCE_PASSWORD=postgres
      depends_on:
        - postgres.producao