services:
    postgres.producao:
      # Usa o Postgres oficial da nuvem
      image: postgres:15   
      container_name: postgres.producao
      ports:
      - "6543:5432"
      environment:
        - POSTGRES_USER=postgres
        - POSTGRES_PASSWORD=postgres
        - POSTGRES_DB=devops_db
      volumes:
        # Cria um diretório chamado 'dados_postgres' para persistência dos dados
        - ./bd:/var/lib/postgresql/data
      # Verifica se o banco de dados está pronto para tentativas de conexão
      healthcheck:
        test: ["CMD-SHELL", "pg_isready -U postgres -d devops_db"]
        interval: 5s
        timeout: 5s
        retries: 10
    api.producao:
      # Usa a API que o GitHub Actions enviou para o Docker Hub
      image: andersonfreire1984/api-devops:latest  
      container_name: api.producao
      ports:
      - "8080:8080"
      environment:
        - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres.producao:5432/devops_db
        - SPRING_DATASOURCE_USERNAME=postgres
        - SPRING_DATASOURCE_PASSWORD=postgres
      depends_on:
        postgres.producao:
          condition: service_healthy