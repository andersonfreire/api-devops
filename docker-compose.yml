services:
    postgres.producao:
      build: postgres 
      container_name: postgres.producao
      ports:
      - "6543:5432"
      environment:
        - POSTGRES_USER=postgres
        - POSTGRES_PASSWORD=postgres
        - POSTGRES_DB=devops_db

    api.producao:
      # O Docker vai carregar o Dockerfile da API da raiz do projeto
      build: .    
      container_name: api.producao
      ports:
      - "8080:8080"
      environment:
        - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres.producao:5432/devops_db
        - SPRING_DATASOURCE_USERNAME=postgres
        - SPRING_DATASOURCE_PASSWORD=postgres
      depends_on:
        - postgres.producao